name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.3.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  TAURI_SKIP_UPDATE_CHECK: true

jobs:
  build:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm tauri:build:windows

      # ===== 调试信息 =====

      - name: Show release directory
        shell: pwsh
        run: |
          Write-Host "========== target/release =========="
          if (Test-Path "src-tauri/target/release") {
            Get-ChildItem "src-tauri/target/release"
          } else {
            Write-Host "target/release not found"
          }

      - name: Show bundle directory
        shell: pwsh
        run: |
          Write-Host "========== bundle =========="

          if (Test-Path "src-tauri/target/release/bundle") {
            Get-ChildItem "src-tauri/target/release/bundle" -Recurse |
              Select-Object FullName
          }
          else {
            Write-Host "bundle directory not found"
          }

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sidereal-desk-windows-x64
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Extract changelog section
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          HEADLINE=$(grep -nE "^##[[:space:]]*\[?${VERSION}\]?($|[[:space:]]|-|\])" CHANGELOG.md | head -n1 | cut -d: -f1 || true)

          if [ -n "$HEADLINE" ]; then
            START=$HEADLINE

            RELNEXT=$(tail -n +$((START+1)) CHANGELOG.md | grep -nE "^##[[:space:]]*" | head -n1 | cut -d: -f1 || true)

            if [ -n "$RELNEXT" ]; then
              END=$((START + RELNEXT - 1))
            else
              END=$(wc -l < CHANGELOG.md)
            fi

            sed -n "${START},${END}p" CHANGELOG.md > release-notes.md
          fi

          if [ ! -s release-notes.md ]; then
            cp CHANGELOG.md release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: |
            release-assets/**
